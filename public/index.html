<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚽ サッカー観戦ガイド</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #e0e0e0;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0;
        }

        header {
            text-align: center;
            padding: 40px 0;
        }

        h1 {
            font-size: 2.5rem;
            background: linear-gradient(90deg, #ff6b6b, #feca57);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .login-section {
            text-align: center;
            padding: 40px 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            backdrop-filter: blur(10px);
            max-width: 400px;
            margin: 0 auto;
        }

        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 5px;
            color: #aaa;
            font-size: 0.9rem;
        }

        .input-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #444;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            font-size: 1rem;
        }

        .input-group input:focus {
            outline: none;
            border-color: #4285f4;
        }

        .login-btn {
            background: linear-gradient(90deg, #4285f4, #34a853);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.1rem;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            width: 100%;
            margin-top: 10px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(66, 133, 244, 0.3);
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 20px 0;
            color: #888;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #444;
        }

        .divider span {
            padding: 0 15px;
            font-size: 0.9rem;
        }

        .google-btn {
            background: #fff;
            color: #333;
            border: none;
            padding: 15px 40px;
            font-size: 1.1rem;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .google-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .google-btn svg {
            width: 20px;
            height: 20px;
        }

        .content {
            display: none;
            padding: 5px 0;
        }

        .content.visible {
            display: block;
        }

        .report-list {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
            padding: 3px;
        }

        .report-list h2 {
            color: #feca57;
            margin-bottom: 8px;
            font-size: 1.5rem;
            padding: 5px;
        }

        .report-item {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 2px;
            padding: 8px 5px;
            margin: 4px 0;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 4px;
            transition: background 0.2s, transform 0.2s;
        }

        .report-item:hover {
            background: rgba(255, 255, 255, 0.12);
            transform: translateX(5px);
        }

        .report-item a {
            color: #74b9ff;
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: 500;
        }

        .report-item a:hover {
            text-decoration: underline;
        }

        .report-meta {
            color: #888;
            font-size: 0.85rem;
        }

        .no-reports {
            text-align: center;
            padding: 40px;
            color: #888;
        }

        .error {
            color: #ff6b6b;
            margin-top: 15px;
            font-size: 0.9rem;
        }

        .success {
            color: #34a853;
            margin-top: 15px;
            font-size: 0.9rem;
        }

        .user-info {
            text-align: right;
            padding: 10px;
            font-size: 0.9rem;
            color: #888;
        }

        .logout-btn {
            background: transparent;
            border: 1px solid #888;
            color: #888;
            padding: 5px 15px;
            border-radius: 15px;
            cursor: pointer;
            margin-left: 10px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #888;
        }

        .debug-info {
            margin-top: 30px;
            padding: 15px;
            background: rgba(255, 100, 100, 0.1);
            border: 1px solid rgba(255, 100, 100, 0.3);
            border-radius: 8px;
            font-size: 0.85rem;
            color: #ff6b6b;
        }

        /* タブフィルタUI */
        .filter-tabs {
            display: flex;
            gap: 0;
            margin-bottom: 15px;
            border-bottom: 2px solid #333;
        }

        .filter-tab {
            padding: 10px 20px;
            background: transparent;
            border: none;
            color: #888;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
        }

        .filter-tab:hover {
            color: #fff;
            font-weight: 600;
        }
    </style>
    <link rel="stylesheet" href="/assets/nav_menu.css">
</head>

<body>
    <!-- Hamburger Navigation (Visible after login) -->
    <div id="hamburger-nav-container" style="display:none;">
        <nav class="hamburger-nav">
            <button class="hamburger-btn" id="hamburger-btn" aria-label="メニュー">☰</button>
        </nav>
        <div class="nav-overlay" id="nav-overlay"></div>
        <div class="nav-drawer" id="nav-drawer">
            <div class="nav-drawer-header">⚽ メニュー</div>
            <ul class="nav-links">
                <li><a href="/calendar.html" class="nav-link" data-page="calendar">📅 カレンダー</a></li>
                <li><a href="/?view=reports" class="nav-link" data-page="reports">📋 レポート一覧</a></li>
            </ul>
        </div>
    </div>

    <div class="container">
        <header>
            <h1>⚽ サッカー観戦ガイド</h1>
            <p>ネタバレなしで試合を楽しむために</p>
        </header>

        <div id="user-info" class="user-info" style="display:none;">
            <span id="user-email"></span>
            <button class="logout-btn" onclick="logout()">ログアウト</button>
        </div>

        <div id="login-section" class="login-section">
            <h2 style="margin-bottom: 25px;">ログイン</h2>
            <div class="input-group">
                <label for="email">メールアドレス</label>
                <input type="email" id="email" placeholder="example@email.com">
            </div>
            <div class="input-group">
                <label for="password">パスワード</label>
                <input type="password" id="password" placeholder="パスワード">
            </div>
            <button class="login-btn" onclick="login()">🔐 ログイン</button>
            <div class="divider"><span>または</span></div>
            <button class="google-btn" onclick="googleLogin()">
                <svg viewBox="0 0 24 24">
                    <path fill="#4285F4"
                        d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
                    <path fill="#34A853"
                        d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                    <path fill="#FBBC05"
                        d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
                    <path fill="#EA4335"
                        d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
                </svg>
                Googleでログイン
            </button>
            <p id="error-message" class="error"></p>
            <p id="success-message" class="success"></p>
        </div>

        <div id="content" class="content">
            <div class="report-list">
                <h2>📋 レポート一覧</h2>
                <div class="filter-tabs">
                    <button class="filter-tab active" data-filter="all" onclick="setFilter('all')">全て表示</button>
                    <button class="filter-tab" data-filter="production"
                        onclick="setFilter('production')">本番レポート</button>
                    <button class="filter-tab" data-filter="debug" onclick="setFilter('debug')">デバッグ情報</button>
                </div>
                <div id="reports-container" class="loading">
                    レポートを読み込み中...
                </div>
            </div>
            <div id="debug-info" class="debug-info" style="display:none;">
                <strong>🔧 デバッグ情報</strong>
                <div id="debug-content"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import {
            getAuth,
            setPersistence,
            browserLocalPersistence,
            getRedirectResult,
            onAuthStateChanged,
            signInWithEmailAndPassword,
            GoogleAuthProvider,
            signInWithPopup
        } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
        import {
            fetchFirebaseConfig,
            fetchAllowedEmails,
            isAllowedEmail,
            logoutUser
        } from '/assets/auth_common.js';

        // フィルタ状態（'all' または 'production'）
        let currentFilter = 'all';

        function isReportsViewRequested() {
            const params = new URLSearchParams(window.location.search);
            return params.get('view') === 'reports';
        }

        function shouldRedirectToCalendarAfterLogin() {
            const path = window.location.pathname;
            const isTopPath = path === '/' || path.endsWith('/index.html');
            return isTopPath && !isReportsViewRequested();
        }

        // タブ切り替え
        window.setFilter = function (filter) {
            currentFilter = filter;
            // タブのactive状態を更新
            document.querySelectorAll('.filter-tab').forEach(tab => {
                tab.classList.toggle('active', tab.dataset.filter === filter);
            });
            // レポート再描画
            loadReportList();
        }

        // Firebase設定を外部ファイルから読み込み
        let firebaseConfig = {};

        // 許可するメールアドレス（allowed_emails.jsonから読み込み）
        let ALLOWED_EMAILS = [];
        let authInitErrorMessage = '';

        function setAuthButtonsEnabled(enabled) {
            const loginBtn = document.querySelector('.login-btn');
            const googleBtn = document.querySelector('.google-btn');
            [loginBtn, googleBtn].forEach((btn) => {
                if (!btn) return;
                btn.disabled = !enabled;
                btn.style.opacity = enabled ? '1' : '0.6';
                btn.style.cursor = enabled ? 'pointer' : 'not-allowed';
            });
        }

        // 初期化
        async function initializeAppMain() {
            try {
                // Firebase設定を読み込み
                firebaseConfig = await fetchFirebaseConfig();
                ALLOWED_EMAILS = await fetchAllowedEmails();

                // Firebase初期化
                const app = initializeApp(firebaseConfig);
                const auth = getAuth(app);

                // 明示的にLOCAL永続化を設定（モバイルでのセッション維持を保証）
                await setPersistence(auth, browserLocalPersistence);
                console.log('[AUTH] Persistence set to LOCAL');

                // Redirect結果を処理（signInWithRedirect使用時のため）
                try {
                    const redirectResult = await getRedirectResult(auth);
                    if (redirectResult && redirectResult.user) {
                        console.log('[AUTH] Redirect login completed:', redirectResult.user.email);
                    }
                } catch (redirectError) {
                    console.warn('[AUTH] Redirect result error (may be normal if not using redirect):', redirectError.code);
                }

                // 認証状態の監視
                onAuthStateChanged(auth, async (user) => {
                    if (user) {
                        // 許可リストが空の場合は再取得を試みる（レースコンディション対策）
                        if (ALLOWED_EMAILS.length === 0) {
                            ALLOWED_EMAILS = await fetchAllowedEmails();
                        }

                        const isAllowed = isAllowedEmail(user.email, ALLOWED_EMAILS);

                        if (isAllowed) {
                            showSuccess('ログイン成功！');
                            if (shouldRedirectToCalendarAfterLogin()) {
                                setTimeout(() => {
                                    window.location.href = '/calendar.html';
                                }, 300);
                            } else {
                                setTimeout(() => {
                                    showContent(user);
                                    // Handle hamburger menu visibility
                                    const nav = document.getElementById('hamburger-nav-container');
                                    if (nav) nav.style.display = 'block';
                                }, 300);
                            }
                        } else {
                            showError('このアカウントは許可リストに登録されていません: ' + user.email);
                            await logoutUser(auth);
                        }
                    } else {
                        showLogin();
                    }
                });

                // ログイン関数をグローバルに設定
                window.login = function () {
                    if (authInitErrorMessage) {
                        showError(authInitErrorMessage);
                        return;
                    }

                    const email = document.getElementById('email').value;
                    const password = document.getElementById('password').value;

                    if (!email || !password) {
                        showError('メールアドレスとパスワードを入力してください');
                        return;
                    }

                    signInWithEmailAndPassword(auth, email, password)
                        .catch((error) => {
                            // Firebaseのエラーコードに応じて日本語メッセージを表示
                            let msg = 'ログインに失敗しました';
                            if (error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password' || error.code === 'auth/invalid-credential') {
                                msg = 'メールアドレスまたはパスワードが間違っています';
                            } else if (error.code === 'auth/invalid-email') {
                                msg = 'メールアドレスの形式が正しくありません';
                            } else if (error.code === 'auth/too-many-requests') {
                                msg = 'ログイン試行回数が多すぎます。しばらく待ってからお試しください';
                            }
                            showError(msg);
                        });
                    // 成功時の処理はonAuthStateChangedで行う
                };

                // Googleログイン関数をグローバルに設定
                window.googleLogin = function () {
                    if (authInitErrorMessage) {
                        showError(authInitErrorMessage);
                        return;
                    }

                    const provider = new GoogleAuthProvider();
                    signInWithPopup(auth, provider)
                        .catch((error) => {
                            let msg = 'Googleログインに失敗しました';
                            if (error.code === 'auth/popup-closed-by-user') {
                                msg = 'ログインがキャンセルされました';
                            } else if (error.code === 'auth/popup-blocked') {
                                msg = 'ポップアップがブロックされました。ポップアップを許可してください';
                            }
                            showError(msg);
                        });
                    // 成功時の処理はonAuthStateChangedで行う
                };

                window.logout = function () {
                    logoutUser(auth);
                };

                setAuthButtonsEnabled(true);

            } catch (e) {
                console.error('Failed to initialize app:', e);
                authInitErrorMessage = 'アプリケーションの初期化に失敗しました';
                showError(authInitErrorMessage);
            }
        }

        setAuthButtonsEnabled(false);
        initializeAppMain();

        // 初期化完了前にボタン押下されても例外を出さないためのガード
        window.login = function () {
            showError(authInitErrorMessage || '初期化中です。少し待ってから再試行してください。');
        };

        window.googleLogin = function () {
            showError(authInitErrorMessage || '初期化中です。少し待ってから再試行してください。');
        };

        window.showLogin = function () {
            document.getElementById('login-section').style.display = 'block';
            document.getElementById('content').classList.remove('visible');
            document.getElementById('user-info').style.display = 'none';
        }

        window.showContent = function (user) {
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('content').classList.add('visible');
            document.getElementById('user-info').style.display = 'block';
            document.getElementById('user-email').textContent = user.email;
            loadReportList();
        }

        window.showError = function (message) {
            document.getElementById('error-message').textContent = message;
            document.getElementById('success-message').textContent = '';
        }

        window.showSuccess = function (message) {
            document.getElementById('success-message').textContent = message;
            document.getElementById('error-message').textContent = '';
        }

        async function loadReportList() {
            const container = document.getElementById('reports-container');
            const debugInfo = document.getElementById('debug-info');
            const debugContent = document.getElementById('debug-content');

            try {
                // キャッシュバスター追加でブラウザキャッシュを回避
                const cacheBuster = Date.now();
                const response = await fetch(`/reports/manifest.json?v=${cacheBuster}`);

                if (!response.ok) {
                    container.innerHTML = '<div class="no-reports">レポートがまだありません。<br>GitHub Actionsでレポートを生成してください。</div>';
                    return;
                }

                const manifest = await response.json();
                const reportsByDate = manifest.reports_by_date || {};

                // 試合開催日リスト (通常モードで使用)
                const sortedMatchDates = Object.keys(reportsByDate).sort().reverse();

                // 1. レポートデータの抽出とフィルタリング
                let allMatches = [];
                Object.values(reportsByDate).forEach(dateData => {
                    (dateData.matches || []).forEach(match => {
                        allMatches.push(match);
                    });
                });

                let visibleMatches = [];
                if (currentFilter === 'debug') {
                    // デバッグ情報: debug/mock のみ
                    visibleMatches = allMatches.filter(m => m.is_debug || m.is_mock);
                } else if (currentFilter === 'production') {
                    // 本番レポート: debug/mock を除外
                    visibleMatches = allMatches.filter(m => !m.is_debug && !m.is_mock);
                } else {
                    // 全て表示
                    visibleMatches = allMatches;
                }

                let html = '';
                let totalCount = 0;

                if (currentFilter === 'debug') {
                    // 2. デバッグモード: 実行日（生成日）でグルーピングして表示
                    html += '<h3 style="color:#ff6b6b;margin:15px 0 10px 0;font-size:1.2rem;">🔧 デバッグレポート (実行日順)</h3>';

                    // 実行日 (YYYYMMDD) ごとにグルーピング
                    const debugGroups = {};
                    visibleMatches.forEach(match => {
                        const timeMatch = match.file.match(/_(\d{8})_(\d{6})\.html$/);
                        let execDate = '不明';
                        if (timeMatch) {
                            const d = timeMatch[1];
                            execDate = `${d.slice(0, 4)}-${d.slice(4, 6)}-${d.slice(6, 8)}`;
                        }
                        if (!debugGroups[execDate]) debugGroups[execDate] = [];
                        debugGroups[execDate].push(match);
                    });

                    // 実行日の降順でソート
                    const sortedExecDates = Object.keys(debugGroups).sort().reverse();

                    sortedExecDates.forEach(date => {
                        const matchesInDate = debugGroups[date];
                        html += `<div style="margin:10px 0 5px 0;font-weight:bold;color:#ff6b6b;font-size:0.95rem;">実行日: ${date}</div>`;

                        const sortedMatches = [...matchesInDate].sort((a, b) => {
                            const timeA = a.file.match(/_(\d{8})_(\d{6})\.html$/);
                            const timeB = b.file.match(/_(\d{8})_(\d{6})\.html$/);
                            const keyA = timeA ? timeA[1] + timeA[2] : '';
                            const keyB = timeB ? timeB[1] + timeB[2] : '';
                            return keyB.localeCompare(keyA);
                        });

                        sortedMatches.forEach(match => {
                            const timeMatch = match.file.match(/_(\d{8})_(\d{6})\.html$/);
                            let timeDisplay = '';
                            if (timeMatch) {
                                const t = timeMatch[2];
                                timeDisplay = ` (${t.slice(0, 2)}:${t.slice(2, 4)})`;
                            }
                            let badge = match.is_mock ? '<span style="background:#9b59b6;color:#fff;padding:2px 6px;border-radius:4px;font-size:0.65rem;margin-left:8px;">MOCK</span>' : '<span style="background:#ff6b6b;color:#fff;padding:2px 6px;border-radius:4px;font-size:0.65rem;margin-left:8px;">DEBUG</span>';
                            const title = `${match.home_team} vs ${match.away_team}${timeDisplay}`;
                            const meta = `${match.match_date || ''} / ${match.competition || ''}`;
                            html += `<div class="report-item"><a href="/reports/${match.file}">${title}${badge}</a><span class="report-meta">${meta}</span></div>`;
                            totalCount++;
                        });
                    });
                } else {
                    // 3. 通常モード: 試合開催日 (Match Date) でグルーピング表示
                    html += '<h3 style="color:#feca57;margin:15px 0 10px 0;font-size:1.2rem;">📅 試合別レポート</h3>';
                    sortedMatchDates.forEach(date => {
                        const matches = reportsByDate[date].matches || [];
                        const dateVisibleMatches = currentFilter === 'production' ? matches.filter(m => !m.is_debug && !m.is_mock) : matches;
                        if (dateVisibleMatches.length === 0) return;
                        html += `<div style="margin:10px 0 5px 0;font-weight:bold;color:#74b9ff;font-size:0.95rem;">${date}</div>`;
                        const sortedMatches = [...dateVisibleMatches].sort((a, b) => {
                            const timeA = a.file.match(/_(\d{8})_(\d{6})\.html$/);
                            const timeB = b.file.match(/_(\d{8})_(\d{6})\.html$/);
                            const keyA = timeA ? timeA[1] + timeA[2] : '';
                            const keyB = timeB ? timeB[1] + timeB[2] : '';
                            return keyB.localeCompare(keyA);
                        });
                        sortedMatches.forEach(match => {
                            const timeMatch = match.file.match(/_(\d{8})_(\d{6})\.html$/);
                            let timeDisplay = '';
                            if (timeMatch) timeDisplay = ` (${timeMatch[1].slice(4, 6)}/${timeMatch[1].slice(6, 8)} ${timeMatch[2].slice(0, 2)}:${timeMatch[2].slice(2, 4)})`;
                            let badge = '';
                            if (match.is_mock) badge = '<span style="background:#9b59b6;color:#fff;padding:2px 6px;border-radius:4px;font-size:0.65rem;margin-left:8px;">MOCK</span>';
                            else if (match.is_debug) badge = '<span style="background:#ff6b6b;color:#fff;padding:2px 6px;border-radius:4px;font-size:0.65rem;margin-left:8px;">DEBUG</span>';
                            const title = `${match.home_team} vs ${match.away_team}${timeDisplay}`;
                            const meta = `${match.competition || ''} / ${match.kickoff_jst || ''}`;
                            html += `<div class="report-item"><a href="/reports/${match.file}">${title}${badge}</a><span class="report-meta">${meta}</span></div>`;
                            totalCount++;
                        });
                    });
                }

                if (totalCount === 0) {
                    container.innerHTML = '<div class="no-reports">レポートがまだありません。</div>';
                    return;
                }

                container.innerHTML = html;

                // デバッグ情報表示
                debugInfo.style.display = 'block';
                const totalMatchDates = sortedMatchDates.length;
                debugContent.innerHTML = `
                    <p>表示中のレポート数: ${totalCount} 試合</p>
                    <p>フィルタ設定: ${currentFilter === 'production' ? '本番レポートのみ' : (currentFilter === 'debug' ? 'デバッグ情報' : '全て表示')}</p>
                    <p>試合開催日数: ${totalMatchDates}</p>
                `;

            } catch (e) {
                container.innerHTML = '<div class="no-reports">レポート読み込みエラー: ' + e.message + '</div>';
                console.error('Failed to load reports:', e);
            }
        }

        // Enterキーでログイン
        document.getElementById('password').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') window.login();
        });
    </script>
    <script src="/assets/nav_menu.js"></script>
</body>

</html>
