{# player-profile-store is no longer needed as profiles are preloaded from external HTML #}

<div class="player-profile-modal" id="player-profile-modal" hidden>
    <div class="player-profile-modal-backdrop" data-player-profile-close></div>
    <div class="player-profile-modal-dialog" role="dialog" aria-modal="true"
        aria-labelledby="player-profile-modal-title">
        <button type="button" class="player-profile-modal-close" data-player-profile-close aria-label="閉じる">×</button>
        <div class="player-profile-modal-header">
            <div class="player-profile-modal-identity">
                <div class="player-profile-modal-photo-frame" id="player-profile-modal-photo-frame" hidden>
                    <img id="player-profile-modal-photo" class="player-profile-modal-photo" alt="">
                </div>
                <div class="player-profile-modal-heading">
                    <div class="player-profile-modal-heading-main">
                        <p class="player-profile-modal-eyebrow">PLAYER PROFILE</p>
                        <h3 id="player-profile-modal-title" class="player-profile-modal-title"></h3>
                    </div>
                    <div class="player-profile-modal-meta" id="player-profile-modal-meta" hidden>
                        <img id="player-profile-modal-flag" class="player-profile-modal-flag" alt="" hidden>
                        <img id="player-profile-modal-team-logo" class="player-profile-modal-team-logo" alt="" hidden>
                    </div>
                </div>
            </div>
        </div>
        <div class="player-profile-modal-content"></div>
    </div>
</div>
