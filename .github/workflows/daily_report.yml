name: Daily Soccer Viewing Guide

on:
  schedule:
    # Runs every 3 hours (0, 3, 6, 9, 12, 15, 18, 21 JST)
    - cron: '0 */3 * * *'
  workflow_dispatch:
    inputs:
      use_mock_data:
        description: 'Use Mock Data'
        required: false
        default: false
        type: boolean
      debug_mode:
        description: 'Enable Debug Mode'
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  id-token: write

jobs:
  generate-report:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        workload_identity_provider: projects/60906964662/locations/global/workloadIdentityPools/github-actions-pool/providers/github-provider
        service_account: fb-non-result@gen-lang-client-0394252790.iam.gserviceaccount.com

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2

    - name: Load secrets from Secret Manager
      run: |
        PROJECT="gen-lang-client-0394252790"
        echo "API_FOOTBALL_KEY=$(gcloud secrets versions access latest --secret=API_FOOTBALL_KEY --project=$PROJECT)" >> $GITHUB_ENV
        echo "GOOGLE_API_KEY=$(gcloud secrets versions access latest --secret=GOOGLE_API_KEY --project=$PROJECT)" >> $GITHUB_ENV
        echo "YOUTUBE_API_KEY=$(gcloud secrets versions access latest --secret=YOUTUBE_API_KEY --project=$PROJECT)" >> $GITHUB_ENV
        echo "NOTIFY_EMAIL=$(gcloud secrets versions access latest --secret=NOTIFY_EMAIL --project=$PROJECT)" >> $GITHUB_ENV
        # JSON secrets: write to temp files to avoid newline issues in GITHUB_ENV
        gcloud secrets versions access latest --secret=GMAIL_TOKEN --project=$PROJECT > /tmp/gmail_token.json
        echo "GMAIL_TOKEN=$(cat /tmp/gmail_token.json)" >> $GITHUB_ENV
        gcloud secrets versions access latest --secret=GMAIL_CREDENTIALS --project=$PROJECT > /tmp/gmail_creds.json
        echo "GMAIL_CREDENTIALS=$(cat /tmp/gmail_creds.json)" >> $GITHUB_ENV
        gcloud secrets versions access latest --secret=FIREBASE_CONFIG --project=$PROJECT > /tmp/firebase_config.json
        echo "FIREBASE_CONFIG=$(cat /tmp/firebase_config.json)" >> $GITHUB_ENV
        gcloud secrets versions access latest --secret=ALLOWED_EMAILS --project=$PROJECT > /tmp/allowed_emails.json
        echo "ALLOWED_EMAILS=$(cat /tmp/allowed_emails.json)" >> $GITHUB_ENV
        rm -f /tmp/gmail_token.json /tmp/gmail_creds.json /tmp/firebase_config.json /tmp/allowed_emails.json

    - name: Run Report Generator
      env:
        USE_MOCK_DATA: ${{ inputs.use_mock_data || 'False' }}
        DEBUG_MODE: ${{ inputs.debug_mode || 'False' }}
        # GCS Cache Settings
        USE_API_CACHE: "True"
        CACHE_BACKEND: "gcs"
        GCS_CACHE_BUCKET: "football-delay-watching-cache"
        # Cache Warming (enable on weekdays when quota is available)
        CACHE_WARMING_ENABLED: "False"
        # Gmail API Settings
        GMAIL_ENABLED: "True"
      run: |
        python main.py

    - name: Verify Report Generated
      run: |
        echo "=== Report Generation Check ==="
        HTML_COUNT=$(ls -1 public/reports/*.html 2>/dev/null | wc -l)
        
        if [ "$HTML_COUNT" -eq 0 ]; then
          echo "ℹ️ 対象試合なし。レポート生成をスキップしました。"
          echo "SKIP_DEPLOY=true" >> $GITHUB_ENV
        else
          echo "✅ Generated $HTML_COUNT HTML report(s)"
          echo ""
          echo "=== Generated Files ==="
          ls -la public/reports/*.html | tail -10
          echo ""
          echo "=== Manifest Summary ==="
          if [ -f "public/reports/manifest.json" ]; then
            cat public/reports/manifest.json | head -30
          fi
          echo ""
          echo "=== End of Summary ==="
        fi
        
    - name: Backup reports to GCS
      if: env.SKIP_DEPLOY != 'true'
      run: |
        echo "=== Backing up reports to GCS ==="
        # 日付ごとのフォルダにバックアップ（重複排除のため rsync ではなく cp を使用するか、バックアップ用ディレクトリへ同期）
        gsutil -m rsync -r public/reports/ gs://football-delay-watching-backup/reports/$(date +'%Y%m%d_%H%M%S')/
        echo "✅ Backup complete"
    - name: Sync existing reports from Firebase
      if: env.SKIP_DEPLOY != 'true'
      run: |
        echo "=== Syncing existing reports from Firebase ==="
        python scripts/sync_firebase_reports.py
        echo "=== Sync Complete ==="
        echo "Local report count: $(ls -1 public/reports/*.html 2>/dev/null | wc -l)"

    - name: Update Calendar HTML
      if: env.SKIP_DEPLOY != 'true'
      env:
        USE_API_CACHE: "True"
        CACHE_BACKEND: "gcs"
        GCS_CACHE_BUCKET: "football-delay-watching-cache"
      run: |
        python -m src.calendar_generator
        echo "✅ Updated calendar.html with new links"





    - name: Validate Firebase deploy secrets
      if: env.SKIP_DEPLOY != 'true'
      run: |
        set -euo pipefail
        if [ -z "${FIREBASE_CONFIG}" ]; then
          echo "❌ FIREBASE_CONFIG is empty"
          exit 1
        fi
        if [ -z "${ALLOWED_EMAILS}" ]; then
          echo "❌ ALLOWED_EMAILS is empty"
          exit 1
        fi
        printf '%s' "${FIREBASE_CONFIG}" > public/firebase_config.json
        printf '%s' "${ALLOWED_EMAILS}" > public/allowed_emails.json
        python -m json.tool public/firebase_config.json > /dev/null
        python -m json.tool public/allowed_emails.json > /dev/null
        echo "✅ Firebase deploy secrets are valid JSON"

    - name: Clean up old Firebase Hosting versions
      if: env.SKIP_DEPLOY != 'true'
      run: |
        python3 << 'EOF'
        import os, json, urllib.request, subprocess, sys

        site_id = os.environ.get("SITE_ID", "football-delay-watching-a8830")
        keep = int(os.environ.get("KEEP", "5"))
        token = subprocess.run(
            ["gcloud", "auth", "print-access-token"],
            capture_output=True, text=True
        ).stdout.strip()

        url = f"https://firebasehosting.googleapis.com/v1beta1/sites/{site_id}/versions?pageSize=100"
        req = urllib.request.Request(url, headers={"Authorization": f"Bearer {token}"})
        try:
            resp = urllib.request.urlopen(req)
            data = json.loads(resp.read())
            versions = [v for v in data.get("versions", []) if v.get("status") == "FINALIZED"]
            versions.sort(key=lambda v: v.get("createTime", ""), reverse=True)
            to_delete = versions[keep:]
            print(f"Found {len(versions)} finalized versions, will delete {len(to_delete)} old ones")
            for v in to_delete:
                name = v["name"]
                del_req = urllib.request.Request(
                    f"https://firebasehosting.googleapis.com/v1beta1/{name}",
                    method="DELETE",
                    headers={"Authorization": f"Bearer {token}"}
                )
                try:
                    urllib.request.urlopen(del_req)
                    print(f"  Deleted: {name.split('/')[-1]}")
                except Exception as e:
                    print(f"  Warning: Could not delete {name.split('/')[-1]}: {e}")
        except Exception as e:
            print(f"Warning: Could not list versions (will attempt deploy anyway): {e}")
        EOF
      env:
        SITE_ID: football-delay-watching-a8830
        KEEP: "10"

    - name: Deploy to Firebase Hosting
      if: env.SKIP_DEPLOY != 'true'
      run: |
        npm install -g firebase-tools
        firebase deploy --only hosting
        echo "✅ Deployed to Firebase Hosting"
        echo "URL: https://football-delay-watching-a8830.web.app"

    - name: Smoke test required endpoints
      if: env.SKIP_DEPLOY != 'true'
      run: |
        set -euo pipefail
        BASE_URL="https://football-delay-watching-a8830.web.app"
        curl -fsS "${BASE_URL}/firebase_config.json" > /dev/null
        curl -fsS "${BASE_URL}/allowed_emails.json" > /dev/null
        curl -fsS "${BASE_URL}/reports/manifest.json" > /dev/null
        echo "✅ Smoke test passed"

    - name: Summary (No Deploy)
      if: env.SKIP_DEPLOY == 'true'
      run: |
        echo "ℹ️ 対象試合なし。デプロイをスキップしました。"
        echo "次回の実行をお待ちください。"
