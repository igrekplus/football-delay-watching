name: Update Match Calendar

on:
  schedule:
    # 火・木・日 JST 02:00 = 前日 UTC 17:00
    - cron: '0 17 * * 1,3,6'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  update-calendar:
    runs-on: ubuntu-latest
    
    steps:
    - name: Enforce main-branch-only execution
      run: |
        if [ "$GITHUB_REF" != "refs/heads/main" ]; then
          echo "❌ Security: This workflow must run on the main branch only."
          echo "   Current ref: $GITHUB_REF"
          exit 1
        fi

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        workload_identity_provider: projects/60906964662/locations/global/workloadIdentityPools/github-actions-pool/providers/github-provider
        service_account: fb-non-result@gen-lang-client-0394252790.iam.gserviceaccount.com

    - name: Load secrets from Secret Manager
      run: |
        set -euo pipefail
        PROJECT="gen-lang-client-0394252790"

        load_secret() {
          local name="$1"
          local value
          value="$(gcloud secrets versions access latest --secret="$name" --project="$PROJECT")"
          while IFS= read -r line; do
            [ -n "$line" ] && echo "::add-mask::$line"
          done <<< "$value"
          {
            echo "$name<<__${name}_EOF__"
            printf '%s\n' "$value"
            echo "__${name}_EOF__"
          } >> "$GITHUB_ENV"
        }

        load_secret API_FOOTBALL_KEY
        load_secret FIREBASE_CONFIG
        load_secret ALLOWED_EMAILS

    - name: Generate Calendar
      env:
        # GCS Cache Settings (Reuse existing cache to save quota)
        USE_API_CACHE: "True"
        CACHE_BACKEND: "gcs"
        GCS_CACHE_BUCKET: "football-delay-watching-cache"
      run: |
        python -m src.calendar_generator

    - name: Sync existing reports from Firebase
      run: |
        echo "=== Syncing existing reports from Firebase ==="
        python scripts/sync_firebase_reports.py
        echo "=== Sync Complete ==="

    - name: Validate Firebase deploy secrets
      run: |
        set -euo pipefail
        if [ -z "${FIREBASE_CONFIG}" ]; then
          echo "❌ FIREBASE_CONFIG is empty"
          exit 1
        fi
        if [ -z "${ALLOWED_EMAILS}" ]; then
          echo "❌ ALLOWED_EMAILS is empty"
          exit 1
        fi
        printf '%s' "${FIREBASE_CONFIG}" > public/firebase_config.json
        printf '%s' "${ALLOWED_EMAILS}" > public/allowed_emails.json
        python -m json.tool public/firebase_config.json > /dev/null
        python -m json.tool public/allowed_emails.json > /dev/null
        echo "✅ Firebase deploy secrets are valid JSON"

    - name: Deploy to Firebase Hosting
      run: |
        npm install -g firebase-tools
        firebase deploy --only hosting
        echo "✅ Deployed to Firebase Hosting"

    - name: Smoke test required endpoints
      run: |
        set -euo pipefail
        BASE_URL="https://football-delay-watching-a8830.web.app"
        curl -fsS "${BASE_URL}/firebase_config.json" > /dev/null
        curl -fsS "${BASE_URL}/allowed_emails.json" > /dev/null
        curl -fsS "${BASE_URL}/reports/manifest.json" > /dev/null
        echo "✅ Smoke test passed"
