name: Update Match Calendar

on:
  schedule:
    # 火・木・日 JST 02:00 = 前日 UTC 17:00
    - cron: '0 17 * * 1,3,6'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-calendar:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

    - name: Generate Calendar
      env:
        API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        # GCS Cache Settings (Reuse existing cache to save quota)
        USE_API_CACHE: "True"
        CACHE_BACKEND: "gcs"
        GCS_CACHE_BUCKET: "football-delay-watching-cache"
      run: |
        python -m src.calendar_generator

    - name: Sync existing reports from Firebase
      run: |
        echo "=== Syncing existing reports from Firebase ==="
        python scripts/sync_firebase_reports.py
        echo "=== Sync Complete ==="

    - name: Deploy to Firebase Hosting
      env:
        FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        FIREBASE_CONFIG: ${{ secrets.FIREBASE_CONFIG }}
        ALLOWED_EMAILS: ${{ secrets.ALLOWED_EMAILS }}
      run: |
        # Firebase設定ファイルを生成
        echo "$FIREBASE_CONFIG" > public/firebase_config.json
        echo "$ALLOWED_EMAILS" > public/allowed_emails.json
        
        npm install -g firebase-tools
        firebase deploy --only hosting --token "$FIREBASE_TOKEN"
        echo "✅ Deployed to Firebase Hosting"
